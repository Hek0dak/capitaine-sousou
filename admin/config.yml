backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: fr

collections:
  - name: "contenu"
    label: "Contenu du site"
    files:

      - name: "hero"
        label: "🏠 Page d'accueil"
        file: "_data/hero.json"
        fields:
          - { label: "Titre ligne 1", name: "titre1", widget: "string" }
          - { label: "Titre ligne 2", name: "titre2", widget: "string" }
          - { label: "Accroche", name: "eyebrow", widget: "string" }
          - { label: "Description", name: "intro", widget: "text" }
          - { label: "Photo principale", name: "photo_hero", widget: "image" }

      - name: "philosophie"
        label: "🌊 Une approche qui laisse de la place"
        file: "_data/philosophie.json"
        fields:
          - { label: "Citation (entre guillemets)", name: "quote", widget: "string" }
          - { label: "Paragraphe 1", name: "texte1", widget: "text" }
          - { label: "Paragraphe 2", name: "texte2", widget: "text" }
          - { label: "Photo portrait", name: "photo", widget: "image", required: false }
          - name: "chips"
            label: "Valeurs (chips colorées)"
            widget: "list"
            field: { label: "Valeur", name: "chip", widget: "string" }
            hint: "Ex : Bienveillance, Adaptation, Douceur…"

      - name: "langues"
        label: "🌍 Section langues"
        file: "_data/langues.json"
        fields:
          - { label: "Titre de la section", name: "titre", widget: "string" }
          - name: "langues"
            label: "Langues"
            widget: "list"
            fields:
              - { label: "Drapeau (emoji)", name: "drapeau", widget: "string" }
              - { label: "Nom de la langue", name: "nom", widget: "string" }
              - { label: "Accroche (dans la langue)", name: "accroche", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

      - name: "niveaux"
        label: "⚓ Niveaux FFVoile"
        file: "_data/niveaux.json"
        fields:
          - name: "niveaux"
            label: "Niveaux"
            widget: "list"
            fields:
              - { label: "Code (ex : N1)", name: "code", widget: "string" }
              - { label: "Titre du niveau", name: "titre", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

      - name: "prestations"
        label: "⛵ Prestations"
        file: "_data/prestations.json"
        fields:
          - name: "stages"
            label: "Stages de voile"
            widget: "object"
            fields:
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Photo", name: "photo", widget: "image" }
          - name: "croisieres"
            label: "Croisières à thème"
            widget: "object"
            fields:
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Photo", name: "photo", widget: "image" }
          - name: "stages_pre"
            label: "Stages pré-organisés"
            widget: "object"
            fields:
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Photo", name: "photo", widget: "image" }
          - name: "cours_prive"
            label: "Cours privés"
            widget: "object"
            fields:
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Photo", name: "photo", widget: "image" }

      - name: "galerie"
        label: "📸 Galerie photos & vidéos"
        file: "_data/galerie.json"
        fields:
          - name: "photos"
            label: "Photos et vidéos"
            widget: "list"
            hint: "Ajoute, supprime et réordonne les médias librement. Pour une vidéo, colle l'URL YouTube dans le champ prévu."
            fields:
              - { label: "Photo", name: "src", widget: "image", required: false, hint: "Laisse vide si c'est une vidéo." }
              - { label: "URL vidéo YouTube (optionnel)", name: "video_url", widget: "string", required: false, hint: "Ex: https://www.youtube.com/watch?v=XXXXX — si rempli, la photo est ignorée." }
              - { label: "Description (texte alternatif)", name: "alt", widget: "string" }
              - { label: "Légende (affichée sous la photo)", name: "legende", widget: "string", required: false }

      - name: "stages_agenda"
        label: "📅 Agenda des stages"
        file: "_data/stages.json"
        fields:
          - name: "stages"
            label: "Prochains stages"
            widget: "list"
            fields:
              - { label: "Nom du stage", name: "nom", widget: "string" }
              - { label: "Date(s)", name: "date", widget: "string" }
              - { label: "Lieu", name: "lieu", widget: "string" }
              - { label: "Durée", name: "duree", widget: "string" }
              - { label: "Nombre de places", name: "places", widget: "string" }
              - { label: "Prix (ex: 290 €)", name: "prix", widget: "string", required: false }
              - { label: "Description courte", name: "description", widget: "text", required: false, hint: "Quelques mots pour donner envie — 1 à 2 phrases max." }
              - label: "Statut"
                name: "statut"
                widget: "select"
                options:
                  - { label: "Places disponibles", value: "open" }
                  - { label: "Complet", value: "full" }
                  - { label: "Terminé", value: "done" }
                  - { label: "À venir", value: "soon" }

      - name: "contact"
        label: "✉️ Contact"
        file: "_data/contact.json"
        fields:
          - { label: "Email de contact", name: "email", widget: "string" }
          - { label: "Texte d'introduction", name: "intro", widget: "text" }

      - name: "temoignages"
        label: "📓 Journal de bord"
        file: "_data/temoignages.json"
        fields:
          - { label: "Afficher le journal sur le site ?", name: "visible", widget: "boolean", default: false, hint: "Active cette option pour rendre le journal visible sur le site." }
          - name: "entrees"
            label: "Entrées du journal"
            widget: "list"
            hint: "Chaque entrée est un petit récit — une sortie, un moment, une anecdote. Les mots-clés aident le référencement."
            fields:
              - { label: "Titre", name: "titre", widget: "string", hint: "Ex: Première sortie de la saison" }
              - { label: "Date", name: "date", widget: "string", hint: "Ex: 15 mai 2026" }
              - { label: "Texte", name: "texte", widget: "text", hint: "Quelques lignes libres sur ce moment." }
              - label: "Mots-clés"
                name: "tags"
                widget: "list"
                field: { label: "Tag", name: "tag", widget: "string" }
                hint: "Ex: dauphins, stage débutant, Marseille — utile pour le référencement Google."

      - name: "faq"
        label: "❓ FAQ"
        file: "_data/faq.json"
        fields:
          - { label: "Afficher sur le site ?", name: "visible", widget: "boolean", default: false, hint: "Active cette option quand tu veux afficher la FAQ." }
          - name: "questions"
            label: "Questions / Réponses"
            widget: "list"
            fields:
              - { label: "Question", name: "question", widget: "string" }
              - { label: "Réponse", name: "reponse", widget: "text" }

